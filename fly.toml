app = "todo-app-backend-neilpmas"
primary_region = "syd"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  # grace_period is hard-capped at 60s by Fly (flyctl silently lowers anything
  # higher). That's fine: a failing check never restarts/replaces a machine on
  # Fly, it only withholds routing until the app answers 2xx. So on a slower
  # cold boot (Flyway connect-retries can add up to ~30s) the check just stays
  # red a bit longer, then flips green -- no flapping, no restart loop.
  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/actuator/health"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
