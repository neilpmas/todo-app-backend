spring:
  application:
    name: template-application
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/placeholder}
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}
  r2dbc:
    url: ${R2DBC_URL:r2dbc:postgresql://localhost:5432/placeholder}
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}
    pool:
      initial-size: 1
      max-size: 5
  flyway:
    enabled: true
    schemas: app
    default-schema: app
    create-schemas: true
    locations: classpath:db/migration
    fail-on-missing-locations: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH0_ISSUER_URI:https://test.example.com/}
          audiences: ${AUTH0_AUDIENCE:https://api.test.example.com}

logging:
  level:
    org.flywaydb: INFO

app:
  environment: ${APP_ENVIRONMENT:local}

grpc:
  server:
    port: 9090
    address: 127.0.0.1
    security:
      enabled: false   # auth is handled at the HTTP layer by the BFF
