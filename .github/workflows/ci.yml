name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 24
        uses: actions/setup-java@v5
        with:
          java-version: "24"
          distribution: "temurin"
          cache: maven
      - name: Build with Maven
        run: ./mvnw -B verify
